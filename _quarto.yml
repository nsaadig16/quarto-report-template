project:
  output-dir: output

format:
  pdf:
    pdf-engine: pdflatex
    documentclass: report
    header-includes:
      - |
        \usepackage{graphicx}
    output-dir: output
    output-file: report.pdf
    mainfont: "Liberation Serif"
    monofont: "Liberation Mono"
    fontsize: 11pt
    geometry: "margin=2.5cm"
    toc: true
    toc-depth: 2
    number-sections: false
    colorlinks: true
    linkcolor: blue
    urlcolor: blue
    fig-pos: "H"
    cite-method: biblatex